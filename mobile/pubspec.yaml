name: you_have_to_say
description: Günlük anket ve oylama uygulaması.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  dio: ^5.8.0+1
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  flutter_screenutil: ^5.9.3
  easy_localization: ^3.0.7+1
  flutter_secure_storage: ^9.2.4
  get_it: ^8.0.3
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
